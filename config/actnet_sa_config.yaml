_base_: "a_default_config.yaml"

arch: "StructAlign"
clip_v_lr: 6e-6 # 6e-6   5e-5  2e-5
clip_t_lr: 6e-6 # 6e-6   5e-5  2e-5
noclip_lr: 1e-5 # 1e-5   5e-5  2e-5
num_frames: 24
batch_size: 32 
project_name: "1-ACTNET_10_StructAlign"
dataset_name: "ACTNET"
videos_dir: "/mnt/data/wang_shaokun/CTVR/datasets/ACTNET/Activity_Clip_Frames/"
benchmark: "anet_clip"
loss: "SCL_and_CRP_v2" 
grad_acc_steps: 1
max_num_epochs: 20 
evals_per_epoch: 1

task_num: 10
wf: True

# Inference fusion switch:
# false -> original word-frame evaluation path
# true  -> fused word-frame + global similarity evaluation path
use_fusion_v3: true
fusion_v3_alpha: 0.5

# Debug option: optional diagnostic logging for SCL_and_CRP_v2 / word-frame validation.
debug_v2: true
debug_v2_interval: 20
debug_v2_verbose: false

# Implementation note: stop a task early when monitored R@1 has no improvement.
early_stop: true
early_stop_patience: 5
early_stop_warmup_epochs: 10
early_stop_min_delta: 0.0